name: get_calendar
description: "Retrieve calendar events, availability windows, and scheduling conflicts for specified participants"
when_to_use: "When finding meeting times, checking for conflicts, or understanding the executive's schedule for a given period"
parameters:
  participant_ids:
    type: array
    description: "List of user or calendar IDs to check availability for"
    required: true
  from:
    type: string
    description: "Start of the time window to query in ISO 8601 datetime format"
    required: true
  to:
    type: string
    description: "End of the time window to query in ISO 8601 datetime format"
    required: true
  include_details:
    type: boolean
    description: "Whether to include event titles where visibility permits"
    default: false
returns:
  type: object
  description: "Busy blocks and free windows for the requested participants across the specified period"
  properties:
    participants:
      type: array
    busy_blocks:
      type: array
      items:
        type: object
        properties:
          participant:
            type: string
          start:
            type: string
          end:
            type: string
          title_if_visible:
            type: string
    free_windows:
      type: array
      items:
        type: object
        properties:
          start:
            type: string
          end:
            type: string
          duration_min:
            type: integer
