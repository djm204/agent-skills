name: get_project_status
description: "Retrieve current project health, milestone progress, budget status, and risk flags"
when_to_use: "When generating status reports, preparing for stakeholder updates, or reviewing overall project health"
parameters:
  project_id:
    type: string
    description: "Unique identifier of the project to retrieve status for"
    required: true
  include_risks:
    type: boolean
    description: "Whether to include the risk register in the response"
    default: true
  include_budget:
    type: boolean
    description: "Whether to include budget allocation and spend data in the response"
    default: true
returns:
  type: object
  description: "Comprehensive project health snapshot including milestones, budget, and risks"
  properties:
    project_id:
      type: string
    name:
      type: string
    phase:
      type: string
    health:
      type: string
      enum: [green, yellow, red]
    milestones:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          due_date:
            type: string
          status:
            type: string
          percent_complete:
            type: number
    budget:
      type: object
      properties:
        allocated:
          type: number
        spent:
          type: number
        forecast:
          type: number
    risks:
      type: array
      items:
        type: object
        properties:
          description:
            type: string
          probability:
            type: string
          impact:
            type: string
          mitigation:
            type: string
